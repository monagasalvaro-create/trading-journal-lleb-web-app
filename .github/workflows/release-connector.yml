name: Release TJ Connector

on:
  push:
    tags:
      - 'connector-v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            asset_name: TJ_Connector_macOS.zip
            binary_name: "TJ Connector.app"
          - os: windows-latest
            platform: win
            asset_name: TJ_Connector_Windows.zip
            binary_name: "TJ Connector.exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./tj-connector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: ./tj-connector
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "TJ Connector" main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        working-directory: ./tj-connector
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "TJ Connector" main.py

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        working-directory: ./tj-connector/dist
        run: |
          Compress-Archive -Path "TJ Connector" -DestinationPath ../${{ matrix.asset_name }}

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        working-directory: ./tj-connector/dist
        run: |
          ditto -c -k --keepParent "TJ Connector.app" ../${{ matrix.asset_name }}

      - name: Release Note & Asset Upload
        uses: softprops/action-gh-release@v1
        with:
          files: tj-connector/${{ matrix.asset_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
