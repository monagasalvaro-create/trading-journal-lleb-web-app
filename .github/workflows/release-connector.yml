name: Release TJ Bridge (Connector)

on:
  push:
    tags:
      - 'connector-v*'

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            asset_name: TJ_Connector_macOS.zip
            pkg_targets: node18-macos-x64,node18-macos-arm64
          - os: windows-latest
            platform: win
            asset_name: TJ_Connector_Windows.zip
            pkg_targets: node18-win-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./bridge
        run: npm ci

      - name: Read-only audit (no placeOrder/cancelOrder/modifyOrder in code)
        working-directory: ./bridge
        shell: bash
        run: |
          if grep -RInE "(^|[^a-zA-Z_])(placeOrder|cancelOrder|modifyOrder|placeOrderAsync)\s*\(" src/; then
            echo "ERROR: write API call detected in bridge/src/. The bridge must remain read-only."
            exit 1
          fi
          echo "Read-only audit passed."

      - name: Build bridge binary (${{ matrix.platform }})
        working-directory: ./bridge
        run: npx pkg . --targets ${{ matrix.pkg_targets }} --out-path build

      - name: Package macOS binaries
        if: runner.os == 'macOS'
        working-directory: ./bridge/build
        run: |
          ls -la
          chmod +x tj-bridge-macos-x64 tj-bridge-macos-arm64 || true
          # xattr clears any quarantine flags on the unsigned binaries so users can run them after `xattr -cr`.
          zip -j ../../${{ matrix.asset_name }} tj-bridge-macos-x64 tj-bridge-macos-arm64

      - name: Package Windows binary
        if: runner.os == 'Windows'
        working-directory: ./bridge/build
        shell: pwsh
        run: |
          Get-ChildItem
          Compress-Archive -Path tj-bridge.exe -DestinationPath ../../${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
